<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streaming Manager</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    :root {
      --bg-1: #020617;
      --bg-2: #0f172a;
      --bg-3: #111827;
      --panel: rgba(15, 23, 42, 0.78);
      --panel-2: rgba(17, 24, 39, 0.88);
      --border-soft: rgba(148, 163, 184, 0.16);
      --text-soft: #94a3b8;
      --primary: #38bdf8;
      --primary-2: #2563eb;
    }

    html {
      min-height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: #f8fafc;
      position: relative;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 12% 18%, rgba(56, 189, 248, 0.22), transparent 0 25%),
        radial-gradient(circle at 88% 15%, rgba(99, 102, 241, 0.20), transparent 0 24%),
        radial-gradient(circle at 50% 85%, rgba(14, 165, 233, 0.12), transparent 0 28%),
        linear-gradient(135deg, #020617 0%, #081225 30%, #0b1730 58%, #111827 100%);
      background-attachment: fixed;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: -1;
      border-radius: 999px;
      filter: blur(80px);
      pointer-events: none;
      opacity: .55;
    }

    body::before {
      width: 320px;
      height: 320px;
      top: 80px;
      left: -60px;
      background: rgba(56, 189, 248, 0.24);
    }

    body::after {
      width: 380px;
      height: 380px;
      right: -80px;
      bottom: 30px;
      background: rgba(59, 130, 246, 0.18);
    }

    button,
    input,
    select,
    textarea {
      font-family: inherit;
    }

    .login {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      position: relative;
      background:
        linear-gradient(rgba(2, 6, 23, 0.20), rgba(2, 6, 23, 0.30));
    }

    .login::before {
      content: "";
      position: absolute;
      width: min(520px, 70vw);
      height: min(520px, 70vw);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.18) 0%, rgba(56, 189, 248, 0) 68%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      filter: blur(16px);
    }

    .login-card {
      width: 100%;
      max-width: 440px;
      position: relative;
      background: rgba(15, 23, 42, 0.76);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 25px 70px rgba(2, 6, 23, 0.52);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .logo-box {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      color: white;
      font-weight: 900;
      font-size: 20px;
      overflow: hidden;
      flex: 0 0 48px;
      box-shadow: 0 12px 30px rgba(37, 99, 235, 0.35);
    }

    .logo.clickable {
      cursor: pointer;
      border: 0;
      padding: 0;
    }

    .logo.clickable:hover {
      opacity: .92;
      transform: translateY(-1px);
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .input-foto {
      display: none;
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    .muted {
      color: var(--text-soft);
      font-size: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #cbd5e1;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
      background: rgba(2, 6, 23, 0.82);
      color: #f8fafc;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 12px;
      padding: 11px 12px;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(56, 189, 248, 0.55);
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.16);
      background: rgba(2, 6, 23, 0.96);
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .btn {
      border: 0;
      padding: 11px 15px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      background: linear-gradient(135deg, #38bdf8, #60a5fa);
      color: #082f49;
      box-shadow: 0 12px 24px rgba(56, 189, 248, 0.18);
      transition: transform .18s ease, opacity .18s ease, box-shadow .18s ease;
    }

    .btn:hover {
      opacity: .96;
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(56, 189, 248, 0.24);
    }

    .btn.secondary {
      background: rgba(31, 41, 55, 0.92);
      color: #f8fafc;
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: none;
    }

    .btn.danger {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      box-shadow: none;
    }

    .btn.small {
      padding: 7px 10px;
      font-size: 12px;
      border-radius: 9px;
    }

    .app {
      display: flex;
      min-height: 100vh;
      position: relative;
    }

    .sidebar {
      width: 260px;
      background: rgba(2, 6, 23, 0.76);
      border-right: 1px solid rgba(255,255,255,.10);
      padding: 20px;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      overflow-y: auto;
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      box-shadow: 18px 0 45px rgba(2, 6, 23, 0.34);
    }

    .sidebar h1 {
      font-size: 20px;
      margin-bottom: 3px;
    }

    .nav {
      display: grid;
      gap: 8px;
      margin-top: 24px;
    }

    .nav button {
      background: transparent;
      border: 0;
      color: #94a3b8;
      text-align: left;
      padding: 13px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      transition: background .2s ease, color .2s ease, transform .2s ease;
    }

    .nav button:hover,
    .nav button.active {
      background: rgba(56,189,248,.15);
      color: white;
      transform: translateX(2px);
    }

    .main {
      margin-left: 260px;
      width: calc(100% - 260px);
      min-height: 100vh;
      padding: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
    }

    .top h2 {
      font-size: 28px;
      margin-bottom: 4px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .cards {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 18px;
    }

    .card {
      background: rgba(15, 23, 42, 0.76);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,.18);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .card-title {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .big {
      font-size: 30px;
      font-weight: 900;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .search {
      max-width: 360px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      border-bottom: 1px solid rgba(255,255,255,.10);
      padding: 12px 9px;
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      color: #94a3b8;
      font-weight: 400;
      background: rgba(255,255,255,.03);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .badge {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }

    .ok {
      background: rgba(34,197,94,.18);
      color: #86efac;
    }

    .warn {
      background: rgba(250,204,21,.18);
      color: #fde68a;
    }

    .today {
      background: rgba(251,146,60,.20);
      color: #fed7aa;
    }

    .bad {
      background: rgba(239,68,68,.20);
      color: #fecaca;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .item {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.10);
      padding: 14px;
      border-radius: 15px;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }

    .empty {
      text-align: center;
      padding: 28px;
      color: #94a3b8;
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .modal {
      width: 100%;
      max-width: 760px;
      max-height: 92vh;
      overflow-y: auto;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 25px 60px rgba(2, 6, 23, 0.40);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
    }

    .note {
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 14px;
    }


    /* ===== FONDO NEÓN ANIMADO TIPO LED ===== */
    .login {
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        radial-gradient(circle at 18% 14%, rgba(236, 72, 153, .22), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(34, 211, 238, .22), transparent 28%),
        linear-gradient(135deg, #030712 0%, #0b1020 42%, #111827 100%);
      background-size: 42px 42px, 42px 42px, auto, auto, auto;
    }

    .neon-wall {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .neon-wall::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(335deg, rgba(255,255,255,.055) 0 2px, transparent 2px 78px),
        linear-gradient(25deg, rgba(255,255,255,.045) 0 2px, transparent 2px 78px),
        linear-gradient(#141414 0 0);
      background-size: 92px 44px, 92px 44px, auto;
      opacity: .72;
      mix-blend-mode: screen;
    }

    .neon-wall::after {
      content: "";
      position: absolute;
      inset: -30%;
      background:
        radial-gradient(circle at 20% 30%, rgba(236, 72, 153, .20), transparent 22%),
        radial-gradient(circle at 82% 36%, rgba(34, 211, 238, .22), transparent 26%),
        radial-gradient(circle at 45% 82%, rgba(59, 130, 246, .16), transparent 24%);
      filter: blur(28px);
      animation: neonAmbient 10s ease-in-out infinite alternate;
    }

    .neon-stage {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      z-index: 1;
      opacity: .95;
    }

    .neon-frame {
      position: relative;
      width: min(820px, 86vw);
      height: min(460px, 62vh);
      border-radius: 24px;
      border: 4px solid rgba(34, 211, 238, .78);
      box-shadow:
        0 0 10px rgba(34, 211, 238, .95),
        0 0 32px rgba(34, 211, 238, .75),
        inset 0 0 24px rgba(34, 211, 238, .35);
      animation: cyanPulse 2.5s ease-in-out infinite;
    }

    .neon-frame::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 14px;
      border: 4px solid rgba(236, 72, 153, .82);
      box-shadow:
        0 0 10px rgba(236, 72, 153, .96),
        0 0 30px rgba(236, 72, 153, .72),
        inset 0 0 22px rgba(236, 72, 153, .35);
      animation: pinkPulse 2.2s ease-in-out infinite alternate;
    }

    .neon-frame::after {
      content: "";
      position: absolute;
      inset: -6px;
      border-radius: 28px;
      background:
        linear-gradient(90deg, transparent, rgba(255,255,255,.95), transparent) top left / 30% 4px no-repeat,
        linear-gradient(180deg, transparent, rgba(255,255,255,.95), transparent) top right / 4px 30% no-repeat,
        linear-gradient(270deg, transparent, rgba(255,255,255,.95), transparent) bottom right / 30% 4px no-repeat,
        linear-gradient(0deg, transparent, rgba(255,255,255,.95), transparent) bottom left / 4px 30% no-repeat;
      filter: drop-shadow(0 0 8px rgba(255,255,255,.85)) drop-shadow(0 0 14px rgba(34,211,238,.85));
      animation: ledRun 4.2s linear infinite;
    }

    .neon-top-line,
    .neon-bottom-line {
      position: absolute;
      left: 12%;
      right: 12%;
      height: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, #22d3ee, #fff, #ec4899, transparent);
      background-size: 240% 100%;
      box-shadow:
        0 0 9px rgba(34, 211, 238, .95),
        0 0 22px rgba(236, 72, 153, .70);
      animation: ledSlide 2.8s linear infinite;
    }

    .neon-top-line {
      top: calc(50% - min(460px, 62vh) / 2 - 18px);
    }

    .neon-bottom-line {
      bottom: calc(50% - min(460px, 62vh) / 2 - 18px);
      animation-direction: reverse;
    }

    .on-air {
      position: absolute;
      top: calc(50% - min(460px, 62vh) / 2 - 54px);
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 28px;
      border: 3px solid rgba(34,211,238,.85);
      border-radius: 10px;
      background: rgba(15, 23, 42, .78);
      color: #f9a8d4;
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 900;
      letter-spacing: 3px;
      text-shadow:
        0 0 4px rgba(255,255,255,.9),
        0 0 10px rgba(236,72,153,.95),
        0 0 24px rgba(236,72,153,.8);
      box-shadow:
        0 0 12px rgba(34,211,238,.9),
        0 0 30px rgba(34,211,238,.62),
        inset 0 0 18px rgba(34,211,238,.20);
      animation: onAirFlicker 3.2s infinite;
    }

    .login-card {
      z-index: 3;
      max-width: 420px;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(2, 6, 23, .76), rgba(15, 23, 42, .58)),
        linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.026) 1px, transparent 1px);
      background-size: auto, 34px 34px, 34px 34px;
      border: 1px solid rgba(34, 211, 238, .46);
      box-shadow:
        0 30px 90px rgba(0, 0, 0, .70),
        0 0 22px rgba(34, 211, 238, .28),
        0 0 46px rgba(236, 72, 153, .18),
        inset 0 0 24px rgba(34, 211, 238, .08);
    }

    .login-card::before {
      content: "";
      position: absolute;
      inset: 0;
      padding: 2px;
      border-radius: inherit;
      background: linear-gradient(120deg, #22d3ee, #ffffff, #ec4899, #22d3ee);
      background-size: 240% 240%;
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      animation: cardBorder 4.5s linear infinite;
      opacity: .88;
    }

    .login-card::after {
      content: "";
      position: absolute;
      inset: -55%;
      background: linear-gradient(115deg, transparent 38%, rgba(34,211,238,.15) 46%, rgba(236,72,153,.14) 52%, transparent 62%);
      transform: translateX(-35%) rotate(8deg);
      animation: cardSweep 5.5s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    .login-card > * {
      position: relative;
      z-index: 1;
    }

    .login-card h1 {
      color: #ffffff;
      text-shadow:
        0 0 8px rgba(255,255,255,.28),
        0 0 18px rgba(34,211,238,.38),
        0 0 28px rgba(236,72,153,.22);
    }

    .login-card .muted {
      color: #bae6fd;
    }

    .login-card label {
      color: #e0f2fe;
      text-shadow: 0 0 10px rgba(34,211,238,.22);
    }

    .login-card input {
      background: rgba(2, 6, 23, .80);
      border-color: rgba(34, 211, 238, .34);
      box-shadow:
        inset 0 0 18px rgba(0,0,0,.28),
        0 0 14px rgba(34,211,238,.08);
    }

    .login-card input:focus {
      border-color: rgba(236, 72, 153, .76);
      box-shadow:
        0 0 0 3px rgba(236, 72, 153, .16),
        0 0 22px rgba(34,211,238,.20),
        inset 0 0 18px rgba(0,0,0,.22);
    }

    .login-card .logo {
      background: linear-gradient(135deg, #22d3ee 0%, #3b82f6 45%, #ec4899 100%);
      box-shadow:
        0 0 14px rgba(34,211,238,.58),
        0 0 26px rgba(236,72,153,.34);
    }

    .login-card .btn {
      color: #031221;
      background: linear-gradient(90deg, #22d3ee 0%, #60a5fa 48%, #ec4899 100%);
      box-shadow:
        0 0 18px rgba(34,211,238,.36),
        0 0 30px rgba(236,72,153,.22);
    }

    .login-card .btn:hover {
      box-shadow:
        0 0 24px rgba(34,211,238,.48),
        0 0 42px rgba(236,72,153,.30);
    }

    @keyframes cardBorder {
      0% { background-position: 0% 50%; }
      100% { background-position: 240% 50%; }
    }

    @keyframes cardSweep {
      0%, 100% { transform: translateX(-42%) rotate(8deg); opacity: .20; }
      45%, 55% { transform: translateX(42%) rotate(8deg); opacity: .62; }
    }

    @keyframes ledSlide {
      0% { background-position: 220% 0; opacity: .72; }
      50% { opacity: 1; }
      100% { background-position: -220% 0; opacity: .72; }
    }

    @keyframes ledRun {
      0% {
        background-position: -35% 0, 100% -35%, 135% 100%, 0 135%;
      }
      100% {
        background-position: 135% 0, 100% 135%, -35% 100%, 0 -35%;
      }
    }

    @keyframes cyanPulse {
      0%, 100% {
        box-shadow:
          0 0 10px rgba(34, 211, 238, .85),
          0 0 30px rgba(34, 211, 238, .62),
          inset 0 0 22px rgba(34, 211, 238, .28);
      }
      50% {
        box-shadow:
          0 0 14px rgba(255,255,255,.9),
          0 0 44px rgba(34, 211, 238, .95),
          inset 0 0 34px rgba(34, 211, 238, .42);
      }
    }

    @keyframes pinkPulse {
      0% {
        opacity: .74;
        box-shadow:
          0 0 9px rgba(236, 72, 153, .75),
          0 0 24px rgba(236, 72, 153, .58),
          inset 0 0 20px rgba(236, 72, 153, .25);
      }
      100% {
        opacity: 1;
        box-shadow:
          0 0 13px rgba(255,255,255,.82),
          0 0 38px rgba(236, 72, 153, .90),
          inset 0 0 30px rgba(236, 72, 153, .38);
      }
    }

    @keyframes onAirFlicker {
      0%, 18%, 21%, 26%, 100% { opacity: 1; }
      20%, 24% { opacity: .66; }
      72% { text-shadow: 0 0 5px #fff, 0 0 16px rgba(236,72,153,1), 0 0 32px rgba(236,72,153,.9); }
    }

    @keyframes neonAmbient {
      0% { transform: translate3d(-2%, -1%, 0) scale(1); }
      100% { transform: translate3d(2%, 2%, 0) scale(1.08); }
    }

    @media (max-width: 620px) {
      .neon-frame {
        width: 92vw;
        height: 58vh;
        opacity: .70;
      }

      .on-air {
        top: 78px;
        font-size: 24px;
        padding: 8px 18px;
      }

      .neon-top-line,
      .neon-bottom-line {
        display: none;
      }
    }


    @media (max-width: 900px) {
      .app {
        display: block;
      }

      .sidebar {
        position: relative;
        width: 100%;
        bottom: auto;
      }

      .main {
        margin-left: 0;
        width: 100%;
      }

      .cards {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 620px) {
      .cards,
      .form-grid {
        grid-template-columns: 1fr;
      }

      .top {
        display: block;
      }

      table {
        display: block;
        overflow-x: auto;
      }

      .login-card {
        padding: 24px 20px;
      }
    }


    /* ===== AJUSTE DE LETRAS Y CONFIGURACIÓN DE FOTO ===== */
    body,
    button,
    input,
    select,
    textarea,
    h1,
    h2,
    h3,
    p,
    label,
    .muted,
    .nav button,
    .card-title,
    .big {
      letter-spacing: normal;
    }

    .login-card {
      max-width: min(500px, calc(100vw - 32px));
      padding: 28px 30px;
    }

    .login-card .logo-box {
      gap: 14px;
      align-items: center;
      margin-bottom: 24px;
    }

    .login-card h1 {
      font-size: clamp(26px, 4.5vw, 34px);
      line-height: 1.08;

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    // ===== SINCRONIZACIÓN EN LA NUBE CON FIREBASE =====
    // 1) Crea un proyecto en Firebase.
    // 2) Activa Firestore Database.
    // 3) Copia aquí la configuración web de tu proyecto.
    // 4) Sube este mismo index.html a GitHub Pages.
    var firebaseConfig = {
      apiKey: "AIzaSyDfV9gVRvsKqpazibGLGYmW1B4YdPVBy9Y",
      authDomain: "adminflujo.firebaseapp.com",
      projectId: "adminflujo",
      storageBucket: "adminflujo.firebasestorage.app",
      messagingSenderId: "408780728879",
      appId: "1:408780728879:web:a9adb2cb68c8f14482b4da"
    };

    // Todos los dispositivos que usen este documento verán la misma información.
    var FIREBASE_DOC_ID = "panel_flujo_roody";
    var firebaseDb = null;
    var firebaseDocRef = null;
    var nubeActiva = false;
    var escuchandoNube = false;
    var ultimoEstadoNube = "";

    var STORAGE_KEY = "streaming_manager_funcional_2026";
    var AUTH_KEY = "streaming_manager_login_2026";
    var vista = "inicio";
    var busqueda = "";

    function crearId() {
      return "id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
    }

    function fecha(dias) {
      var d = new Date();
      d.setDate(d.getDate() + dias);
      return d.toISOString().slice(0, 10);
    }

    function datosIniciales() {
      var cuenta1 = crearId();
      var cuenta2 = crearId();

      return {
        config: {
          negocio: "Streaming Manager",
          admin: "Administrador",
          moneda: "S/",
          fotoPerfil: ""
        },
        cuentas: [
          {
            id: cuenta1,
            servicio: "Netflix",
            correo: "netflix@email.com",
            clave: "123456",
            perfil: "Perfil 1",
            pin: "0000",
            pantallas: "4",
            vence: fecha(25),
            costo: "35",
            notas: "Cuenta de ejemplo"
          },
          {
            id: cuenta2,
            servicio: "Disney+",
            correo: "disney@email.com",
            clave: "123456",
            perfil: "Perfil 2",
            pin: "1111",
            pantallas: "2",
            vence: fecha(12),
            costo: "20",
            notas: "Cuenta de ejemplo"
          }
        ],
        clientes: [
          {
            id: crearId(),
            nombre: "Cliente Demo",
            telefono: "51999999999",
            servicio: "Netflix",
            cuentaId: cuenta1,
            inicio: fecha(-10),
            vence: fecha(5),
            precio: "15",
            notas: "Cliente de ejemplo"
          }
        ],
        pagos: []
      };
    }

    function datosValidos(data) {
      return (
        data &&
        data.config &&
        Array.isArray(data.cuentas) &&
        Array.isArray(data.clientes) &&
        Array.isArray(data.pagos)
      );
    }

    function normalizarDatos(data) {
      if (!data.config) data.config = {};
      if (data.config.fotoPerfil == null) data.config.fotoPerfil = "";
      if (data.config.negocio == null) data.config.negocio = "Streaming Manager";
      if (data.config.admin == null) data.config.admin = "Administrador";
      if (data.config.moneda == null) data.config.moneda = "S/";
      return data;
    }

    function cargar() {
      try {
        var guardado = localStorage.getItem(STORAGE_KEY);
        if (guardado) {
          var data = JSON.parse(guardado);
          if (datosValidos(data)) {
            return normalizarDatos(data);
          }
        }
      } catch (e) {
        console.log("Error cargando datos:", e);
      }

      var nuevo = datosIniciales();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(nuevo));
      return nuevo;
    }

    var estado = cargar();

    function guardarLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(estado));
    }

    function firebaseConfigurado() {
      return (
        firebaseConfig.apiKey &&
        firebaseConfig.projectId &&
        firebaseConfig.apiKey.indexOf("PEGA_AQUI") === -1 &&
        firebaseConfig.projectId.indexOf("PEGA_AQUI") === -1
      );
    }

    async function iniciarNube() {
      if (!firebaseConfigurado()) {
        console.log("Firebase aún no está configurado. La app seguirá guardando en este navegador.");
        return;
      }

      if (nubeActiva) return;

      try {
        var appFirebase = initializeApp(firebaseConfig);
        firebaseDb = getFirestore(appFirebase);
        firebaseDocRef = doc(firebaseDb, "streaming_manager", FIREBASE_DOC_ID);

        var snap = await getDoc(firebaseDocRef);

        if (snap.exists() && datosValidos(snap.data().estado)) {
          estado = normalizarDatos(snap.data().estado);
          guardarLocal();
          render();
        } else {
          await setDoc(firebaseDocRef, {
            estado: estado,
            actualizado: serverTimestamp()
          }, { merge: true });
        }

        ultimoEstadoNube = JSON.stringify(estado);
        nubeActiva = true;

        if (!escuchandoNube) {
          escuchandoNube = true;

          onSnapshot(firebaseDocRef, function(snapActual) {
            if (!snapActual.exists()) return;

            var remoto = snapActual.data().estado;
            if (!datosValidos(remoto)) return;

            remoto = normalizarDatos(remoto);
            var remotoJson = JSON.stringify(remoto);
            var localJson = JSON.stringify(estado);

            if (remotoJson !== localJson) {
              estado = remoto;
              ultimoEstadoNube = remotoJson;
              guardarLocal();
              render();
            }
          });
        }

        console.log("Sincronización en la nube activada.");
      } catch (e) {
        console.log("Error conectando con Firebase:", e);
        alert("No se pudo conectar con Firebase. Revisa la configuración y las reglas de Firestore.");
      }
    }

    async function guardarNube() {
      if (!firebaseDocRef) return;

      try {
        var actualJson = JSON.stringify(estado);
        if (actualJson === ultimoEstadoNube) return;

        ultimoEstadoNube = actualJson;

        await setDoc(firebaseDocRef, {
          estado: estado,
          actualizado: serverTimestamp()
        }, { merge: true });
      } catch (e) {
        console.log("Error guardando en Firebase:", e);
      }
    }

    function guardar() {
      guardarLocal();
      guardarNube();
    }

    function texto(v) {
      return String(v == null ? "" : v)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function dinero(v) {
      var n = Number(v || 0);
      return estado.config.moneda + " " + n.toFixed(2);
    }

    function diasRestantes(fechaFinal) {
      var hoy = new Date();
      hoy.setHours(0, 0, 0, 0);
      var fin = new Date(fechaFinal + "T00:00:00");
      return Math.ceil((fin - hoy) / 86400000);
    }

    function estadoVence(fechaFinal) {
      var d = diasRestantes(fechaFinal);

      if (d < 0) {
        return { clase: "bad", texto: "Vencido" };
      }

      if (d === 0) {
        return { clase: "today", texto: "Vence hoy" };
      }

      if (d <= 5) {
        return { clase: "warn", texto: "Vence en " + d + " días" };
      }

      return { clase: "ok", texto: "Activo" };
    }

    function cuentaNombre(id) {
      for (var i = 0; i < estado.cuentas.length; i++) {
        if (estado.cuentas[i].id === id) {
          return estado.cuentas[i].servicio + " - " + estado.cuentas[i].correo;
        }
      }
      return "Sin cuenta";
    }

    function clienteNombre(id) {
      for (var i = 0; i < estado.clientes.length; i++) {
        if (estado.clientes[i].id === id) {
          return estado.clientes[i].nombre;
        }
      }
      return "Sin cliente";
    }

    function logoPerfil() {
      var foto = estado.config && estado.config.fotoPerfil ? estado.config.fotoPerfil : "";

      if (foto) {
        return '<button class="logo clickable" onclick="abrirSelectorFoto()" title="Cambiar foto de perfil">' +
          '<img src="' + texto(foto) + '" alt="Foto de perfil">' +
        '</button>';
      }

      return '<button class="logo clickable" onclick="abrirSelectorFoto()" title="Cambiar foto de perfil">SM</button>';
    }

    function logoPerfilLogin() {
      var foto = estado.config && estado.config.fotoPerfil ? estado.config.fotoPerfil : "";

      if (foto) {
        return '<div class="logo">' +
          '<img src="' + texto(foto) + '" alt="Foto de perfil">' +
        '</div>';
      }

      return '<div class="logo">SM</div>';
    }

    function vistaPreviaFotoPerfil() {
      var foto = estado.config && estado.config.fotoPerfil ? estado.config.fotoPerfil : "";

      if (foto) {
        return '<div class="profile-preview-logo">' +
          '<img src="' + texto(foto) + '" alt="Foto de perfil actual">' +
        '</div>';
      }

      return '<div class="profile-preview-logo">SM</div>';
    }

    function abrirSelectorFoto() {
      var input = document.getElementById("fotoPerfilInput");
      if (input) input.click();
    }

    function cambiarFotoPerfil(event) {
      var archivo = event.target.files && event.target.files[0];
      if (!archivo) return;

      if (!archivo.type || archivo.type.indexOf("image/") !== 0) {
        alert("Selecciona una imagen válida.");
        return;
      }

      var lector = new FileReader();

      lector.onload = function(e) {
        var img = new Image();

        img.onload = function() {
          var max = 300;
          var escala = Math.min(max / img.width, max / img.height, 1);

          var canvas = document.createElement("canvas");
          canvas.width = Math.round(img.width * escala);
          canvas.height = Math.round(img.height * escala);

          var ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

          estado.config.fotoPerfil = canvas.toDataURL("image/jpeg", 0.85);
          guardar();
          render();
        };

        img.onerror = function() {
          alert("No se pudo cargar la imagen. Intenta con otra foto.");
        };

        img.src = e.target.result;
      };

      lector.readAsDataURL(archivo);
    }

            '<label>Perfil</label>' +
            '<input name="perfil" value="' + texto(a.perfil) + '">' +
          '</div>' +
          '<div>' +
            '<label>PIN</label>' +
            '<input name="pin" value="' + texto(a.pin) + '">' +
          '</div>' +
          '<div>' +
            '<label>Pantallas</label>' +
            '<input name="pantallas" value="' + texto(a.pantallas) + '">' +
          '</div>' +
          '<div>' +
            '<label>Fecha de vencimiento</label>' +
            '<input type="date" name="vence" value="' + texto(a.vence) + '">' +
          '</div>' +
          '<div>' +
            '<label>Costo</label>' +
            '<input type="number" step="0.01" name="costo" value="' + texto(a.costo) + '">' +
          '</div>' +
          '<div class="full">' +
            '<label>Notas</label>' +
            '<textarea name="notas">' + texto(a.notas) + '</textarea>' +
          '</div>' +
        '</div>',
        function(data) {
          if (id) {
            estado.cuentas = estado.cuentas.map(function(x) {
              return x.id === id ? Object.assign({}, x, data) : x;
            });
          } else {
            data.id = crearId();
            estado.cuentas.push(data);
          }

          guardar();
          cerrarModal();
          render();
        }
      );
    }

    function formPago() {
      var opciones = "";
      estado.clientes.forEach(function(c) {
        opciones += '<option value="' + texto(c.id) + '">' + texto(c.nombre) + ' - ' + texto(c.servicio) + '</option>';
      });

      if (estado.clientes.length === 0) {
        alert("Primero registra un cliente.");
        return;
      }

      abrirModal(
        "Nuevo pago",
        '<div class="form-grid">' +
          '<div>' +
            '<label>Fecha</label>' +
            '<input type="date" name="fecha" value="' + fecha(0) + '">' +
          '</div>' +
          '<div>' +
            '<label>Cliente</label>' +
            '<select name="clienteId">' + opciones + '</select>' +
          '</div>' +
          '<div>' +
            '<label>Monto</label>' +
            '<input type="number" step="0.01" name="monto" required>' +
          '</div>' +
          '<div>' +
            '<label>Método</label>' +
            '<select name="metodo">' +
              '<option>Yape</option>' +
              '<option>Plin</option>' +
              '<option>Transferencia</option>' +
              '<option>Efectivo</option>' +
              '<option>Otro</option>' +
            '</select>' +
          '</div>' +
          '<div class="full">' +
            '<label>Detalle</label>' +
            '<textarea name="detalle"></textarea>' +
          '</div>' +
        '</div>',
        function(data) {
          data.id = crearId();
          estado.pagos.push(data);
          guardar();
          cerrarModal();
          render();
        }
      );
    }

    function renovarCliente(id) {
      var c = null;

      for (var i = 0; i < estado.clientes.length; i++) {
        if (estado.clientes[i].id === id) c = estado.clientes[i];
      }

      if (!c) return;

      abrirModal(
        "Renovar cliente",
        '<div class="form-grid">' +
          '<div>' +
            '<label>Cliente</label>' +
            '<input disabled value="' + texto(c.nombre) + '">' +
          '</div>' +
          '<div>' +
            '<label>Nueva fecha de vencimiento</label>' +
            '<input type="date" name="vence" value="' + fecha(30) + '">' +
          '</div>' +
          '<div>' +
            '<label>Monto pagado</label>' +
            '<input type="number" step="0.01" name="monto" value="' + texto(c.precio) + '">' +
          '</div>' +
          '<div>' +
            '<label>Método</label>' +
            '<select name="metodo">' +
              '<option>Yape</option>' +
              '<option>Plin</option>' +
              '<option>Transferencia</option>' +
              '<option>Efectivo</option>' +
              '<option>Otro</option>' +
            '</select>' +
          '</div>' +
        '</div>',
        function(data) {
          c.vence = data.vence;

          estado.pagos.push({
            id: crearId(),
            fecha: fecha(0),
            clienteId: c.id,
            monto: data.monto,
            metodo: data.metodo,
            detalle: "Renovación de " + c.servicio
          });

          guardar();
          cerrarModal();
          render();
        }
      );
    }

    function whatsapp(id) {
      var c = null;

      for (var i = 0; i < estado.clientes.length; i++) {
        if (estado.clientes[i].id === id) c = estado.clientes[i];
      }

      if (!c) return;

      var tel = String(c.telefono || "").replace(/\D/g, "");

      if (!tel) {
        alert("Este cliente no tiene teléfono registrado.");
        return;
      }

      var mensaje = "Hola " + c.nombre + ", te recordamos que tu servicio " + c.servicio + " vence el " + c.vence + ". Puedes renovar para continuar activo.";
      window.open("https://wa.me/" + tel + "?text=" + encodeURIComponent(mensaje), "_blank");
    }

    function eliminarCliente(id) {
      if (!confirm("¿Eliminar este cliente?")) return;
      estado.clientes = estado.clientes.filter(function(c) {
        return c.id !== id;
      });
      guardar();
      render();
    }

    function eliminarCuenta(id) {
      if (!confirm("¿Eliminar esta cuenta?")) return;
      estado.cuentas = estado.cuentas.filter(function(a) {
        return a.id !== id;
      });
      guardar();
      render();
    }

    function eliminarPago(id) {
      if (!confirm("¿Eliminar este pago?")) return;
      estado.pagos = estado.pagos.filter(function(p) {
        return p.id !== id;
      });
      guardar();
      render();
    }

    function guardarConfig() {
      estado.config.negocio = document.getElementById("cfgNegocio").value;
      estado.config.admin = document.getElementById("cfgAdmin").value;
      estado.config.moneda = document.getElementById("cfgMoneda").value;
      guardar();
      render();
    }

    function borrarTodo() {
      if (!confirm("Esto borrará todos los clientes, cuentas y pagos. ¿Continuar?")) return;
      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(AUTH_KEY);
      estado = datosIniciales();
      guardar();
      render();
    }

    function exportarCSV(tipo) {
      var filas = [];

      if (tipo === "clientes") {
        filas.push(["Nombre", "Telefono", "Servicio", "Cuenta", "Inicio", "Vence", "Precio", "Notas"]);
        estado.clientes.forEach(function(c) {
          filas.push([c.nombre, c.telefono, c.servicio, cuentaNombre(c.cuentaId), c.inicio, c.vence, c.precio, c.notas]);
        });
      }

      if (tipo === "cuentas") {
        filas.push(["Servicio", "Correo", "Clave", "Perfil", "PIN", "Pantallas", "Vence", "Costo", "Notas"]);
        estado.cuentas.forEach(function(a) {
          filas.push([a.servicio, a.correo, a.clave, a.perfil, a.pin, a.pantallas, a.vence, a.costo, a.notas]);
        });
      }

      if (tipo === "pagos") {
        filas.push(["Fecha", "Cliente", "Monto", "Metodo", "Detalle"]);
        estado.pagos.forEach(function(p) {
          filas.push([p.fecha, clienteNombre(p.clienteId), p.monto, p.metodo, p.detalle]);
        });
      }

      var csv = filas.map(function(fila) {
        return fila.map(function(celda) {
          return '"' + String(celda == null ? "" : celda).replace(/"/g, '""') + '"';
        }).join(",");
      }).join("\n");

      var blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = tipo + ".csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    window.abrirSelectorFoto = abrirSelectorFoto;
    window.cambiarFotoPerfil = cambiarFotoPerfil;
    window.quitarFotoPerfil = quitarFotoPerfil;
    window.iniciarSesion = iniciarSesion;
    window.iniciarNube = iniciarNube;
    window.cerrarSesion = cerrarSesion;
    window.ir = ir;
    window.filtrar = filtrar;
    window.formCliente = formCliente;
    window.formCuenta = formCuenta;
    window.formPago = formPago;
    window.renovarCliente = renovarCliente;
    window.whatsapp = whatsapp;
    window.eliminarCliente = eliminarCliente;
    window.eliminarCuenta = eliminarCuenta;
    window.eliminarPago = eliminarPago;
    window.guardarConfig = guardarConfig;
    window.borrarTodo = borrarTodo;
    window.exportarCSV = exportarCSV;
    window.cerrarModal = cerrarModal;

    render();
    if (localStorage.getItem(AUTH_KEY) === "ok") {
      iniciarNube();
    }
  </script>
</body>
</html>
