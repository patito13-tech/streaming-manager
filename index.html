<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Streaming Manager</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      background: #0f172a;
      color: #f8fafc;
    }

    button,
    input,
    select,
    textarea {
      font-family: inherit;
    }

    .login {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: linear-gradient(135deg, #020617, #0f172a, #1e293b);
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: #111827;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 25px 60px rgba(0,0,0,.35);
    }

    .logo-box {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .logo {
      width: 48px;
      height: 48px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #38bdf8, #2563eb);
      color: white;
      font-weight: 900;
      font-size: 20px;
      overflow: hidden;
      flex: 0 0 48px;
    }

    .logo.clickable {
      cursor: pointer;
      border: 0;
      padding: 0;
    }

    .logo.clickable:hover {
      opacity: .9;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .input-foto {
      display: none;
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    .muted {
      color: #94a3b8;
      font-size: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      color: #cbd5e1;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
      background: #020617;
      color: #f8fafc;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 12px;
      padding: 11px 12px;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .btn {
      border: 0;
      padding: 11px 15px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      background: #38bdf8;
      color: #082f49;
    }

    .btn:hover {
      opacity: .9;
    }

    .btn.secondary {
      background: #1f2937;
      color: #f8fafc;
      border: 1px solid rgba(255,255,255,.12);
    }

    .btn.danger {
      background: #ef4444;
      color: white;
    }

    .btn.small {
      padding: 7px 10px;
      font-size: 12px;
      border-radius: 9px;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: #020617;
      border-right: 1px solid rgba(255,255,255,.10);
      padding: 20px;
      position: fixed;
      top: 0;
      bottom: 0;
      left: 0;
      overflow-y: auto;
    }

    .sidebar h1 {
      font-size: 20px;
      margin-bottom: 3px;
    }

    .nav {
      display: grid;
      gap: 8px;
      margin-top: 24px;
    }

    .nav button {
      background: transparent;
      border: 0;
      color: #94a3b8;
      text-align: left;
      padding: 13px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
    }

    .nav button:hover,
    .nav button.active {
      background: rgba(56,189,248,.15);
      color: white;
    }

    .main {
      margin-left: 260px;
      width: calc(100% - 260px);
      padding: 24px;
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 22px;
    }

    .top h2 {
      font-size: 28px;
      margin-bottom: 4px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .cards {
      grid-template-columns: repeat(4, minmax(0, 1fr));
      margin-bottom: 18px;
    }

    .card {
      background: #111827;
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,.18);
    }

    .card-title {
      color: #94a3b8;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .big {
      font-size: 30px;
      font-weight: 900;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .search {
      max-width: 360px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th,
    td {
      border-bottom: 1px solid rgba(255,255,255,.10);
      padding: 12px 9px;
      text-align: left;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      color: #94a3b8;
      font-weight: 400;
      background: rgba(255,255,255,.03);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .badge {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
    }

    .ok {
      background: rgba(34,197,94,.18);
      color: #86efac;
    }

    .warn {
      background: rgba(250,204,21,.18);
      color: #fde68a;
    }

    .today {
      background: rgba(251,146,60,.20);
      color: #fed7aa;
    }

    .bad {
      background: rgba(239,68,68,.20);
      color: #fecaca;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .item {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.10);
      padding: 14px;
      border-radius: 15px;
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
    }

    .empty {
      text-align: center;
      padding: 28px;
      color: #94a3b8;
    }

    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .modal {
      width: 100%;
      max-width: 760px;
      max-height: 92vh;
      overflow-y: auto;
      background: #0f172a;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 22px;
      padding: 22px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 13px;
    }

    .full {
      grid-column: 1 / -1;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
    }

    .note {
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.5;
      margin-top: 14px;
    }

    @media (max-width: 900px) {
      .app {
        display: block;
      }

      .sidebar {
        position: relative;
        width: 100%;
        bottom: auto;
      }

      .main {
        margin-left: 0;
        width: 100%;
      }

      .cards {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 620px) {
      .cards,
      .form-grid {
        grid-template-columns: 1fr;
      }

      .top {
        display: block;
      }

      table {
        display: block;
        overflow-x: auto;
      }
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <div class="modal-bg" id="modalBg">
    <div class="modal" id="modal"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    // ===== SINCRONIZACIÓN EN LA NUBE CON FIREBASE =====
    // 1) Crea un proyecto en Firebase.
    // 2) Activa Firestore Database.
    // 3) Copia aquí la configuración web de tu proyecto.
    // 4) Sube este mismo index.html a GitHub Pages.
    var firebaseConfig = {
      apiKey: "AIzaSyDfV9gVRvsKqpazibGLGYmW1B4YdPVBy9Y",
      authDomain: "adminflujo.firebaseapp.com",
      projectId: "adminflujo",
      storageBucket: "adminflujo.firebasestorage.app",
      messagingSenderId: "408780728879",
      appId: "1:408780728879:web:a9adb2cb68c8f14482b4da"
    };

    // Todos los dispositivos que usen este documento verán la misma información.
    var FIREBASE_DOC_ID = "panel_flujo_roody";
    var firebaseDb = null;
    var firebaseDocRef = null;
    var nubeActiva = false;
    var escuchandoNube = false;
    var ultimoEstadoNube = "";

    var STORAGE_KEY = "streaming_manager_funcional_2026";
    var AUTH_KEY = "streaming_manager_login_2026";
    var vista = "inicio";
    var busqueda = "";

    function crearId() {
      return "id-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 10);
    }

    function fecha(dias) {
      var d = new Date();
      d.setDate(d.getDate() + dias);
      return d.toISOString().slice(0, 10);
    }

    function datosIniciales() {
      var cuenta1 = crearId();
      var cuenta2 = crearId();

      return {
        config: {
          negocio: "Streaming Manager",
          admin: "Administrador",
          moneda: "S/",
          fotoPerfil: ""
        },
        cuentas: [
          {
            id: cuenta1,
            servicio: "Netflix",
            correo: "netflix@email.com",
            clave: "123456",
            perfil: "Perfil 1",
            pin: "0000",
            pantallas: "4",
            vence: fecha(25),
            costo: "35",
            notas: "Cuenta de ejemplo"
          },
          {
            id: cuenta2,
            servicio: "Disney+",
            correo: "disney@email.com",
            clave: "123456",
            perfil: "Perfil 2",
            pin: "1111",
            pantallas: "2",
            vence: fecha(12),
            costo: "20",
            notas: "Cuenta de ejemplo"
          }
        ],
        clientes: [
          {
            id: crearId(),
            nombre: "Cliente Demo",
            telefono: "51999999999",
            servicio: "Netflix",
            cuentaId: cuenta1,
            inicio: fecha(-10),
            vence: fecha(5),
            precio: "15",
            notas: "Cliente de ejemplo"
          }
        ],
        pagos: []
      };
    }

    function datosValidos(data) {
      return (
        data &&
        data.config &&
        Array.isArray(data.cuentas) &&
        Array.isArray(data.clientes) &&
        Array.isArray(data.pagos)
      );
    }

    function normalizarDatos(data) {
      if (!data.config) data.config = {};
      if (data.config.fotoPerfil == null) data.config.fotoPerfil = "";
      if (data.config.negocio == null) data.config.negocio = "Streaming Manager";
      if (data.config.admin == null) data.config.admin = "Administrador";
      if (data.config.moneda == null) data.config.moneda = "S/";
      return data;
    }

    function cargar() {
      try {
        var guardado = localStorage.getItem(STORAGE_KEY);
        if (guardado) {
          var data = JSON.parse(guardado);
          if (datosValidos(data)) {
            return normalizarDatos(data);
          }
        }
      } catch (e) {
        console.log("Error cargando datos:", e);
      }

      var nuevo = datosIniciales();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(nuevo));
      return nuevo;
    }

    var estado = cargar();

    function guardarLocal() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(estado));
    }

    function firebaseConfigurado() {
      return (
        firebaseConfig.apiKey &&
        firebaseConfig.projectId &&
        firebaseConfig.apiKey.indexOf("PEGA_AQUI") === -1 &&
        firebaseConfig.projectId.indexOf("PEGA_AQUI") === -1
      );
    }

    async function iniciarNube() {
      if (!firebaseConfigurado()) {
        console.log("Firebase aún no está configurado. La app seguirá guardando en este navegador.");
        return;
      }

      if (nubeActiva) return;

      try {
        var appFirebase = initializeApp(firebaseConfig);
        firebaseDb = getFirestore(appFirebase);
        firebaseDocRef = doc(firebaseDb, "streaming_manager", FIREBASE_DOC_ID);

        var snap = await getDoc(firebaseDocRef);

        if (snap.exists() && datosValidos(snap.data().estado)) {
          estado = normalizarDatos(snap.data().estado);
          guardarLocal();
          render();
        } else {
          await setDoc(firebaseDocRef, {
            estado: estado,
            actualizado: serverTimestamp()
          }, { merge: true });
        }

        ultimoEstadoNube = JSON.stringify(estado);
        nubeActiva = true;

        if (!escuchandoNube) {
          escuchandoNube = true;

          onSnapshot(firebaseDocRef, function(snapActual) {
            if (!snapActual.exists()) return;

            var remoto = snapActual.data().estado;
            if (!datosValidos(remoto)) return;

            remoto = normalizarDatos(remoto);
            var remotoJson = JSON.stringify(remoto);
            var localJson = JSON.stringify(estado);

            if (remotoJson !== localJson) {
              estado = remoto;
              ultimoEstadoNube = remotoJson;
              guardarLocal();
              render();
            }
          });
        }

        console.log("Sincronización en la nube activada.");
      } catch (e) {
        console.log("Error conectando con Firebase:", e);
        alert("No se pudo conectar con Firebase. Revisa la configuración y las reglas de Firestore.");
      }
    }

    async function guardarNube() {
      if (!firebaseDocRef) return;

      try {
        var actualJson = JSON.stringify(estado);
        if (actualJson === ultimoEstadoNube) return;

        ultimoEstadoNube = actualJson;

        await setDoc(firebaseDocRef, {
          estado: estado,
          actualizado: serverTimestamp()
        }, { merge: true });
      } catch (e) {
        console.log("Error guardando en Firebase:", e);
      }
    }

    function guardar() {
      guardarLocal();
      guardarNube();
    }

    function texto(v) {
      return String(v == null ? "" : v)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function dinero(v) {
      var n = Number(v || 0);
      return estado.config.moneda + " " + n.toFixed(2);
    }

    function diasRestantes(fechaFinal) {
      var hoy = new Date();
      hoy.setHours(0, 0, 0, 0);
      var fin = new Date(fechaFinal + "T00:00:00");
      return Math.ceil((fin - hoy) / 86400000);
    }

    function estadoVence(fechaFinal) {
      var d = diasRestantes(fechaFinal);

      if (d < 0) {
        return { clase: "bad", texto: "Vencido" };
      }

      if (d === 0) {
        return { clase: "today", texto: "Vence hoy" };
      }

      if (d <= 5) {
        return { clase: "warn", texto: "Vence en " + d + " días" };
      }

      return { clase: "ok", texto: "Activo" };
    }

    function cuentaNombre(id) {
      for (var i = 0; i < estado.cuentas.length; i++) {
        if (estado.cuentas[i].id === id) {
          return estado.cuentas[i].servicio + " - " + estado.cuentas[i].correo;
        }
      }
      return "Sin cuenta";
    }

    function clienteNombre(id) {
      for (var i = 0; i < estado.clientes.length; i++) {
        if (estado.clientes[i].id === id) {
          return estado.clientes[i].nombre;
        }
      }
      return "Sin cliente";
    }

    function logoPerfil() {
      var foto = estado.config && estado.config.fotoPerfil ? estado.config.fotoPerfil : "";

      if (foto) {
        return '<button class="logo clickable" onclick="abrirSelectorFoto()" title="Cambiar foto de perfil">' +
          '<img src="' + texto(foto) + '" alt="Foto de perfil">' +
        '</button>';
      }

      return '<button class="logo clickable" onclick="abrirSelectorFoto()" title="Cambiar foto de perfil">SM</button>';
    }

    function abrirSelectorFoto() {
      var input = document.getElementById("fotoPerfilInput");
      if (input) input.click();
    }

    function cambiarFotoPerfil(event) {
      var archivo = event.target.files && event.target.files[0];
      if (!archivo) return;

      if (!archivo.type || archivo.type.indexOf("image/") !== 0) {
        alert("Selecciona una imagen válida.");
        return;
      }

      var lector = new FileReader();

      lector.onload = function(e) {
        var img = new Image();

        img.onload = function() {
          var max = 300;
          var escala = Math.min(max / img.width, max / img.height, 1);

          var canvas = document.createElement("canvas");
          canvas.width = Math.round(img.width * escala);
          canvas.height = Math.round(img.height * escala);

          var ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

          estado.config.fotoPerfil = canvas.toDataURL("image/jpeg", 0.85);
          guardar();
          render();
        };

        img.onerror = function() {
          alert("No se pudo cargar la imagen. Intenta con otra foto.");
        };

        img.src = e.target.result;
      };

      lector.readAsDataURL(archivo);
    }

    function quitarFotoPerfil() {
      if (!confirm("¿Quitar la foto de perfil actual?")) return;
      estado.config.fotoPerfil = "";
      guardar();
      render();
    }

    function render() {
      if (localStorage.getItem(AUTH_KEY) !== "ok") {
        renderLogin();
        return;
      }

      document.getElementById("app").innerHTML =
        '<div class="app">' +
          '<aside class="sidebar">' +
            '<div class="logo-box">' +
              logoPerfil() +
              '<input id="fotoPerfilInput" class="input-foto" type="file" accept="image/*" onchange="cambiarFotoPerfil(event)">' +
              '<div>' +
                '<h1>' + texto(estado.config.negocio) + '</h1>' +
                '<div class="muted">' + texto(estado.config.admin) + '</div>' +
              '</div>' +
            '</div>' +

            '<div class="nav">' +
              botonNav("inicio", "📊 Panel principal") +
              botonNav("clientes", "👥 Clientes") +
              botonNav("cuentas", "🔐 Cuentas") +
              botonNav("renovaciones", "⏰ Renovaciones") +
              botonNav("pagos", "💰 Pagos") +
              botonNav("reportes", "📄 Reportes") +
              botonNav("configuracion", "⚙️ Configuración") +
              '<button onclick="cerrarSesion()">🚪 Cerrar sesión</button>' +
            '</div>' +
          '</aside>' +

          '<main class="main" id="contenido"></main>' +
        '</div>';

      renderVista();
    }

    function botonNav(id, label) {
      var activo = vista === id ? "active" : "";
      return '<button class="' + activo + '" onclick="ir(\'' + id + '\')">' + label + '</button>';
    }

    function renderLogin() {
      document.getElementById("app").innerHTML =
        '<div class="login">' +
          '<div class="login-card">' +
            '<div class="logo-box">' +
              '<div class="logo">SM</div>' +
              '<div>' +
                '<h1>Streaming Manager</h1>' +
                '<p class="muted">Panel de control para cuentas de streaming</p>' +
              '</div>' +
            '</div>' +

            '<label>Usuario</label>' +
            '<input id="usuario" placeholder="Usuario" autocomplete="off" autocapitalize="off" spellcheck="false">' +
            '<br><br>' +

            '<label>Contraseña</label>' +
            '<input id="clave" type="password" placeholder="Contraseña" autocomplete="new-password">' +
            '<br><br>' +

            '<button class="btn" style="width:100%" onclick="iniciarSesion()">Ingresar</button>' +
          '</div>' +
        '</div>';
    }

    function iniciarSesion() {
      var u = document.getElementById("usuario").value.trim();
      var c = document.getElementById("clave").value.trim();

      if (u === "admin" && c === "1234") {
        localStorage.setItem(AUTH_KEY, "ok");
        render();
        iniciarNube();
      } else {
        alert("Usuario o contraseña incorrectos.");
      }
    }

    function cerrarSesion() {
      localStorage.removeItem(AUTH_KEY);
      render();
    }

    function ir(v) {
      vista = v;
      busqueda = "";
      render();
    }

    function renderVista() {
      if (vista === "inicio") renderInicio();
      if (vista === "clientes") renderClientes();
      if (vista === "cuentas") renderCuentas();
      if (vista === "renovaciones") renderRenovaciones();
      if (vista === "pagos") renderPagos();
      if (vista === "reportes") renderReportes();
      if (vista === "configuracion") renderConfiguracion();
    }

    function cabecera(titulo, subtitulo, boton) {
      return (
        '<div class="top">' +
          '<div>' +
            '<h2>' + titulo + '</h2>' +
            '<p class="muted">' + subtitulo + '</p>' +
          '</div>' +
          '<div>' + (boton || "") + '</div>' +
        '</div>'
      );
    }

    function renderInicio() {
      var clientes = estado.clientes.length;
      var cuentas = estado.cuentas.length;
      var porVencer = estado.clientes.filter(function(c) {
        var d = diasRestantes(c.vence);
        return d >= 0 && d <= 5;
      }).length;

      var vencidos = estado.clientes.filter(function(c) {
        return diasRestantes(c.vence) < 0;
      }).length;

      var ingresos = estado.pagos.reduce(function(s, p) {
        return s + Number(p.monto || 0);
      }, 0);

      var proximos = estado.clientes.slice().sort(function(a, b) {
        return diasRestantes(a.vence) - diasRestantes(b.vence);
      }).slice(0, 8);

      var html =
        cabecera("Panel principal", "Resumen general del negocio.", "") +

        '<div class="grid cards">' +
          card("Clientes", clientes) +
          card("Cuentas", cuentas) +
          card("Por vencer", porVencer) +
          card("Vencidos", vencidos) +
        '</div>' +

        '<div class="grid cards">' +
          card("Ingresos registrados", dinero(ingresos)) +
          card("Pagos", estado.pagos.length) +
          card("Servicios activos", estado.clientes.filter(function(c){ return diasRestantes(c.vence) >= 0; }).length) +
          card("Total cuentas", estado.cuentas.length) +

    function abrirModal(titulo, contenido, guardarFn) {
      document.getElementById("modalBg").style.display = "flex";
      document.getElementById("modal").innerHTML =
        '<h3>' + titulo + '</h3>' +
        '<form id="formModal">' +
          contenido +
          '<div class="modal-actions">' +
            '<button type="button" class="btn secondary" onclick="cerrarModal()">Cancelar</button>' +
            '<button type="submit" class="btn">Guardar</button>' +
          '</div>' +
        '</form>';

      document.getElementById("formModal").onsubmit = function(e) {
        e.preventDefault();
        var fd = new FormData(e.target);
        var obj = {};
        fd.forEach(function(value, key) {
          obj[key] = value;
        });
        guardarFn(obj);
      };
    }

          c.vence = data.vence;

          estado.pagos.push({

            monto: data.monto,

    function whatsapp(id) {
      var c = null;

      for (var i = 0; i < estado.clientes.length; i++) {
        if (estado.clientes[i].id === id) c = estado.clientes[i];
      }

      if (!c) return;

      var tel = String(c.telefono || "").replace(/\D/g, "");

      if (!tel) {
        alert("Este cliente no tiene teléfono registrado.");
        return;
      }

      var mensaje = "Hola " + c.nombre + ", te recordamos que tu servicio " + c.servicio + " vence el " + c.vence + ". Puedes renovar para continuar activo.";
      window.open("https://wa.me/" + tel + "?text=" + encodeURIComponent(mensaje), "_blank");
    }

      if (tipo === "clientes") {
        filas.push(["Nombre", "Telefono", "Servicio", "Cuenta", "Inicio", "Vence", "Precio", "Notas"]);
        estado.clientes.forEach(function(c) {
          filas.push([c.nombre, c.telefono, c.servicio, cuentaNombre(c.cuentaId), c.inicio, c.vence, c.precio, c.notas]);
        });
      }

      if (tipo === "cuentas") {
        filas.push(["Servicio", "Correo", "Clave", "Perfil", "PIN", "Pantallas", "Vence", "Costo", "Notas"]);
        estado.cuentas.forEach(function(a) {
          filas.push([a.servicio, a.correo, a.clave, a.perfil, a.pin, a.pantallas, a.vence, a.costo, a.notas]);
        });
      }

      if (tipo === "pagos") {
        filas.push(["Fecha", "Cliente", "Monto", "Metodo", "Detalle"]);
        estado.pagos.forEach(function(p) {
          filas.push([p.fecha, clienteNombre(p.clienteId), p.monto, p.metodo, p.detalle]);
        });
      }

      var csv = filas.map(function(fila) {
        return fila.map(function(celda) {
          return '"' + String(celda == null ? "" : celda).replace(/"/g, '""') + '"';
        }).join(",");
      }).join("\n");

      var blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url;
      a.download = tipo + ".csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    window.abrirSelectorFoto = abrirSelectorFoto;
    window.cambiarFotoPerfil = cambiarFotoPerfil;
    window.quitarFotoPerfil = quitarFotoPerfil;
    window.iniciarSesion = iniciarSesion;
    window.iniciarNube = iniciarNube;
    window.cerrarSesion = cerrarSesion;
    window.ir = ir;
    window.filtrar = filtrar;
    window.formCliente = formCliente;
    window.formCuenta = formCuenta;
    window.formPago = formPago;
    window.renovarCliente = renovarCliente;
    window.whatsapp = whatsapp;
    window.eliminarCliente = eliminarCliente;
    window.eliminarCuenta = eliminarCuenta;
    window.eliminarPago = eliminarPago;
    window.guardarConfig = guardarConfig;
    window.borrarTodo = borrarTodo;
    window.exportarCSV = exportarCSV;
    window.cerrarModal = cerrarModal;

    render();
    if (localStorage.getItem(AUTH_KEY) === "ok") {
      iniciarNube();
    }
  </script>
